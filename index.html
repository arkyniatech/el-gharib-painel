<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>El Gharib — Painel</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1f17">
<style>
  :root {
    --bg:#0f1f17; --panel:#172a20; --panel2:#1e3628; --border:#2c4a38;
    --gold:#d4af37; --gold-l:#e9cd77; --text:#ede6d4; --muted:#96ac9c;
    --danger:#d16a62; --ok:#52b98a; --warn:#e0a95c;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    padding:14px 14px calc(86px + env(safe-area-inset-bottom)); }
  .top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .top img { width:52px; height:52px; border-radius:50%; }
  .top h1 { font-family:Georgia,serif; color:var(--gold); font-size:20px; margin:0; }
  .top .upd { font-size:12px; color:var(--muted); }
  .chip { display:inline-block; font-size:12px; border-radius:99px; padding:3px 12px;
    background:var(--panel2); color:var(--muted); }
  .chip.ok { color:var(--ok); }
  .chip.off { color:var(--danger); }
  .cards { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:12px 10px; text-align:center; }
  .card .l { font-size:11px; color:var(--muted); }
  .card .v { font-size:17px; font-weight:800; color:var(--gold-l); margin-top:4px; }
  section { background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:14px; margin-bottom:12px; }
  section h2 { font-family:Georgia,serif; color:var(--gold); font-size:16px; margin:0 0 10px; }
  .line { display:flex; justify-content:space-between; gap:10px; padding:7px 0;
    border-bottom:1px solid #22392c; font-size:14px; }
  .line:last-child { border-bottom:none; }
  .gold { color:var(--gold-l); font-weight:700; }
  .muted { color:var(--muted); }
  .bars { display:flex; align-items:flex-end; gap:6px; height:110px; padding-top:6px; }
  .bar { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
  .bar .col { width:100%; background:linear-gradient(180deg,var(--gold-l),var(--gold)); border-radius:5px 5px 0 0; min-height:2px; }
  .bar .d { font-size:10px; color:var(--muted); }
  .bar .t { font-size:9px; color:var(--gold-l); }
  .comanda { background:var(--panel2); border:1px solid var(--border); border-radius:12px;
    padding:10px 12px; margin-bottom:8px; }
  .comanda .hd { display:flex; justify-content:space-between; font-weight:700; }
  .comanda .it { font-size:12px; color:var(--muted); margin-top:4px; }
  .tags { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:12px; border-radius:99px; padding:4px 12px; background:#3a2c1a; color:var(--warn); }
  .center { text-align:center; padding:50px 20px; color:var(--muted); }
  .center .big { font-size:50px; }
  .search input { width:100%; background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; color:var(--text); font-size:16px; outline:none; margin-bottom:10px; }
  .prow { display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:11px 12px; margin-bottom:8px; }
  .prow .nm { flex:1; min-width:0; font-size:14px; font-weight:600; }
  .prow .sub { font-size:11px; color:var(--muted); font-weight:400; margin-top:2px; }
  .prow.inactive { opacity:.45; }
  .stepper { display:flex; align-items:center; gap:8px; }
  .stepper button { width:36px; height:36px; border-radius:10px; border:1px solid var(--border);
    background:var(--panel2); color:var(--gold-l); font-size:19px; line-height:1; }
  .stepper button.add { background:linear-gradient(180deg,var(--gold-l),var(--gold)); color:#21301c; border:none; font-weight:800; }
  .stepper span { min-width:16px; text-align:center; font-weight:700; }
  .tabbar { position:fixed; left:0; right:0; bottom:0; display:flex; z-index:30;
    background:#0c1a12; border-top:1px solid var(--border);
    padding:6px 8px calc(6px + env(safe-area-inset-bottom)); }
  .tab { flex:1; background:none; border:none; color:var(--muted); font-size:11px;
    padding:6px 0; border-radius:10px; }
  .tab .ic { font-size:20px; display:block; margin-bottom:2px; }
  .tab.on { color:var(--gold-l); background:var(--panel2); }
  .sheet-bg { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:flex-end; z-index:40; }
  .sheet { background:var(--panel); border-radius:18px 18px 0 0; border-top:1px solid var(--gold);
    width:100%; max-height:88vh; overflow-y:auto; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); }
  .sheet h2 { font-family:Georgia,serif; color:var(--gold); margin:0 0 12px; font-size:19px; }
  label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  input.f, select.f { width:100%; background:#0d1b13; border:1px solid var(--border); border-radius:10px;
    padding:12px; color:var(--text); font-size:16px; outline:none; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn { width:100%; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:800;
    background:linear-gradient(180deg,var(--gold-l),var(--gold)); color:#21301c; margin-top:14px; }
  .btn.ghost { background:none; border:1px solid var(--border); color:var(--muted); font-weight:400; }
  .btn:disabled { opacity:.5; }
  .paybtns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
  .paybtns button { border:1px solid var(--border); background:var(--panel2); color:var(--text);
    border-radius:10px; padding:12px; font-size:14px; }
  .paybtns button.on { border-color:var(--gold); color:var(--gold-l); font-weight:700; }
  .toast { position:fixed; top:calc(12px + env(safe-area-inset-top)); left:12px; right:12px; z-index:60;
    background:var(--panel2); border:1px solid var(--gold); border-radius:12px; padding:13px 16px;
    font-size:14px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .cartbar { position:fixed; left:12px; right:12px; bottom:calc(64px + env(safe-area-inset-bottom)); z-index:30;
    background:linear-gradient(180deg,var(--gold-l),var(--gold)); color:#21301c; border-radius:14px;
    padding:15px; font-size:16px; font-weight:800; text-align:center; border:none; width:calc(100% - 24px);
    box-shadow:0 8px 30px rgba(0,0,0,.5); }
</style>
</head>
<body>
<div id="app"><div class="center"><div class="big">💎</div>Carregando…</div></div>
<nav class="tabbar" id="tabbar" style="display:none">
  <button class="tab on" data-v="painel" onclick="go('painel')"><span class="ic">📊</span>Painel</button>
  <button class="tab" data-v="comandas" onclick="go('comandas')"><span class="ic">📋</span>Comandas</button>
  <button class="tab" data-v="produtos" onclick="go('produtos')"><span class="ic">📦</span>Produtos</button>
  <button class="tab" data-v="venda" onclick="go('venda')"><span class="ic">🛒</span>Venda</button>
</nav>

<script src="zxing.js"></script>
<script>
const SUPABASE_URL = 'https://znnimedzlfllqbhguguj.supabase.co'
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpubmltZWR6bGZsbHFiaGd1Z3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2OTA1MjMsImV4cCI6MjA4NDI2NjUyM30.hKninXOBl1ln6LdPpO6SpWexlcXs3Qlp3wZO9E7bj-8'
const H = { apikey: ANON_KEY, Authorization: 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' }

const params = new URLSearchParams(location.search)
if (params.get('t')) {
  localStorage.setItem('token', params.get('t'))
  history.replaceState(null, '', location.pathname)
}
const TOKEN = localStorage.getItem('token')

let snap = null, updatedAt = null, view = 'painel'
let pTerm = '', vTerm = '', cart = {}, payMethod = 'PIX', editP = null
let selectedMesa = null, cTerm = ''
let localComandas = JSON.parse(localStorage.getItem('localComandas') || '{}')
let lastServerMesas = []
let closingMesas = new Set()
function saveLocalComandas() { localStorage.setItem('localComandas', JSON.stringify(localComandas)) }
let editedIds = new Set(JSON.parse(localStorage.getItem('editedIds') || '[]'))
function markEdited(id) { editedIds.add(id); localStorage.setItem('editedIds', JSON.stringify([...editedIds])) }
const app = document.getElementById('app')

const money = (c) => ((c || 0) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))
const hora = (ts) => (ts || '').includes(' ') ? ts.split(' ')[1].slice(0, 5) : new Date(ts).toLocaleTimeString('pt-BR').slice(0, 5)
const diaLabel = (iso) => ['dom','seg','ter','qua','qui','sex','sáb'][new Date(iso + 'T12:00:00').getDay()]
const maskMoney = (v) => {
  const d = String(v).replace(/\D/g, '').replace(/^0+(?=\d)/, '').slice(0, 10)
  return (parseInt(d || '0', 10) / 100).toFixed(2).replace('.', ',')
}
const cents = (v) => Math.round(parseFloat(String(v).replace(/\./g, '').replace(',', '.')) * 100) || 0

function toast(msg, ms = 3500) {
  document.querySelector('.toast')?.remove()
  const el = document.createElement('div')
  el.className = 'toast'
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(() => el.remove(), ms)
}

async function rpc(fn, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, { method: 'POST', headers: H, body: JSON.stringify(body) })
  if (!r.ok) throw new Error((await r.text()).slice(0, 120))
  const text = await r.text()
  return text ? JSON.parse(text) : null
}

// Comando pro PDV executar (aplica em até ~15s no caixa)
async function sendCommand(type, payload) {
  return rpc('gharib_command', { p_token: TOKEN, p_type: type, p_payload: payload })
}

async function load() {
  if (!TOKEN) {
    app.innerHTML = '<div class="center"><div class="big">🔒</div>Link inválido.<br>Peça o link completo do painel.</div>'
    return
  }
  try {
    const data = await rpc('gharib_painel', { p_token: TOKEN })
    if (!data || !data.snapshot) throw new Error('sem dados')
    snap = data.snapshot
    updatedAt = data.updated_at
    // Comanda paga/fechada no caixa (estava na nuvem e sumiu) → limpa o rascunho local
    const serverMesas = (snap.comandas || []).map((c) => String(c.mesa))
    for (const mesa of Object.keys(localComandas)) {
      if (lastServerMesas.includes(mesa) && !serverMesas.includes(mesa)) {
        delete localComandas[mesa]
        if (String(selectedMesa) === mesa) selectedMesa = null
      }
    }
    for (const mesa of [...closingMesas]) if (!serverMesas.includes(mesa)) closingMesas.delete(mesa)
    lastServerMesas = serverMesas
    saveLocalComandas()
    document.getElementById('tabbar').style.display = 'flex'
    const busy = document.querySelector('.sheet-bg') ||
      ['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement?.tagName)
    if (!busy) render()
  } catch (e) {
    if (!snap) app.innerHTML = '<div class="center"><div class="big">📡</div>Sem conexão com o painel.<br>Confira a internet.</div>'
  }
}

window.go = (v) => {
  view = v
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('on', t.dataset.v === v))
  render()
}

function render() {
  if (!snap) return
  if (view === 'painel') renderPainel()
  if (view === 'comandas') renderComandas()
  if (view === 'produtos') renderProdutos()
  if (view === 'venda') renderVenda()
}

// ---------- PAINEL ----------
function renderPainel() {
  const s = snap, t = s.today
  const ticket = t.count > 0 ? Math.round(t.total / t.count) : 0
  const maxWeek = Math.max(...s.week.map((d) => d.total), 1)
  app.innerHTML = `
    <div class="top">
      <img src="logo.png" alt="">
      <div>
        <h1>El Gharib</h1>
        <div class="upd">atualizado às ${new Date(updatedAt).toLocaleTimeString('pt-BR').slice(0, 5)} ·
          <span class="chip ${s.cash.open ? 'ok' : 'off'}">${s.cash.open ? 'caixa aberto · ' + money(s.cash.expected) : 'caixa fechado'}</span>
        </div>
      </div>
    </div>
    <div class="cards">
      <div class="card"><div class="l">Hoje</div><div class="v">${money(t.total)}</div></div>
      <div class="card"><div class="l">Vendas</div><div class="v">${t.count}</div></div>
      <div class="card"><div class="l">Ticket</div><div class="v">${money(ticket)}</div></div>
    </div>
    ${s.comandas.length ? `<section><h2>📋 Comandas abertas (${s.comandas.length})</h2>
      ${s.comandas.map((c) => `<div class="comanda"><div class="hd">
        <span>${c.mesa ? 'Mesa ' + esc(c.mesa) : esc(c.customer_name)}${c.mesa && c.customer_name ? ' — ' + esc(c.customer_name) : ''}</span>
        <span class="gold">${money(c.total)}</span></div>
        <div class="it">${c.items.map((i) => `${i.qty}x ${esc(i.name)}`).join(' · ') || 'sem itens'}</div></div>`).join('')}
    </section>` : ''}
    <section><h2>📈 Últimos 7 dias</h2><div class="bars">
      ${s.week.map((d) => `<div class="bar">
        <span class="t">${d.total ? money(d.total).replace('R$ ', '').split(',')[0] : ''}</span>
        <div class="col" style="height:${Math.round((d.total / maxWeek) * 78)}%"></div>
        <span class="d">${diaLabel(d.date)}</span></div>`).join('')}
    </div></section>
    ${t.byPayment.length ? `<section><h2>💳 Por forma de pagamento</h2>
      ${t.byPayment.map((p) => `<div class="line"><span>${esc(p.payment_method)}</span><span class="gold">${money(p.total)}</span></div>`).join('')}
    </section>` : ''}
    ${t.topProducts.length ? `<section><h2>🏆 Mais vendidos hoje</h2>
      ${t.topProducts.map((p) => `<div class="line"><span>${esc(p.name)}</span><span class="muted">${p.qty}x · <span class="gold">${money(p.total)}</span></span></div>`).join('')}
    </section>` : ''}
    ${t.sales.length ? `<section><h2>🧾 Vendas de hoje</h2>
      ${t.sales.map((v) => `<div class="line"><span class="muted">${hora(v.created_at)} ${esc(v.who)}</span>
        <span><span class="muted">${esc(v.payment_method)}</span> <span class="gold">${money(v.total)}</span></span></div>`).join('')}
    </section>` : ''}
    ${s.low_stock.length ? `<section><h2>⚠️ Estoque baixo (${s.low_stock.length})</h2>
      <div class="tags">${s.low_stock.map((p) => `<span class="tag">${esc(p.name)}: ${p.stock}</span>`).join('')}</div></section>` : ''}
    ${s.expiring.length ? `<section><h2>📅 Vencendo em 30 dias (${s.expiring.length})</h2>
      <div class="tags">${s.expiring.map((p) => `<span class="tag">${esc(p.name)}</span>`).join('')}</div></section>` : ''}
  `
}

// ---------- PRODUTOS ----------
function renderProdutos() {
  const list = (snap.products || [])
    .filter((p) => !pTerm || p.name.toLowerCase().includes(pTerm.toLowerCase()) || p.barcode === pTerm)
    .slice(0, 80)
  app.innerHTML = `
    <div class="top"><img src="logo.png"><div><h1>Produtos</h1>
      <div class="upd">${(snap.products || []).length} cadastrados · edite e o caixa aplica em ~15s</div></div></div>
    <div class="search"><input placeholder="🔍 Buscar produto…" value="${esc(pTerm)}" oninput="setPTerm(this.value)"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn" style="margin:0;flex:1" onclick="openEdit('new')">+ Novo produto</button>
      ${editedIds.size ? `<button class="btn ghost" style="margin:0;width:auto;padding:0 14px" onclick="clearEdited()">Limpar ✓ (${editedIds.size})</button>` : ''}
    </div>
    ${list.map((p) => `
      <div class="prow ${p.active ? '' : 'inactive'}" onclick="openEdit(${p.id})" ${editedIds.has(p.id) ? 'style="border-color:var(--ok)"' : ''}>
        <div class="nm">${esc(p.name)}${p.by_weight ? ' <span class="chip">kg</span>' : ''}${p.active ? '' : ' <span class="chip off">inativo</span>'}${editedIds.has(p.id) ? ' <span class="chip" style="color:var(--ok)">✓ editado</span>' : ''}
          <div class="sub">${esc(p.category)} · estoque ${String(p.stock).replace('.', ',')}${p.stock <= p.min_stock ? ' ⚠️' : ''}</div>
        </div>
        <span class="gold">${money(p.price)}${p.by_weight ? '/kg' : ''}</span>
      </div>`).join('')}
  `
}
window.setPTerm = (t) => { pTerm = t; renderProdutos(); refocus('.search input') }
window.clearEdited = () => { if (confirm('Limpar as marcações de editado?')) { editedIds = new Set(); localStorage.removeItem('editedIds'); renderProdutos() } }
window.setVTerm = (t) => { vTerm = t; renderVenda(); refocus('.search input') }
function refocus(sel) {
  const el = document.querySelector(sel)
  if (el) { const n = el.value.length; el.focus(); el.setSelectionRange(n, n) }
}

window.openEdit = (id) => {
  const p = id === 'new'
    ? { id: null, name: '', category: '', price: 0, cost: 0, stock: 0, min_stock: 0, barcode: '', active: 1, by_weight: 0 }
    : snap.products.find((x) => x.id === id)
  editP = p
  const bg = document.createElement('div')
  bg.className = 'sheet-bg'
  bg.onclick = (e) => { if (e.target === bg) bg.remove() }
  bg.innerHTML = `<div class="sheet">
    <h2>${p.id ? 'Editar produto' : 'Novo produto'}</h2>
    <label>Foto</label>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      <img id="ePhotoPreview" style="width:64px;height:64px;border-radius:10px;object-fit:cover;display:none;border:1px solid var(--border)">
      <div id="ePhotoEmpty" style="width:64px;height:64px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:26px">📷</div>
      <button type="button" class="btn ghost" style="margin:0;flex:1" onclick="document.getElementById('ePhotoInput').click()">Escolher / tirar foto</button>
    </div>
    <input type="file" id="ePhotoInput" accept="image/*" style="display:none" onchange="onPhotoPick(this)">
    <label>Nome</label><input class="f" id="eNome" value="${esc(p.name)}">
    <div class="grid2">
      <div><label>Preço (R$)${p.by_weight ? ' /kg' : ''}</label>
        <input class="f" id="ePreco" inputmode="numeric" value="${maskMoney(p.price)}" oninput="this.value = maskMoney(this.value)"></div>
      <div><label>Custo (R$)</label>
        <input class="f" id="eCusto" inputmode="numeric" value="${maskMoney(p.cost)}" oninput="this.value = maskMoney(this.value)"></div>
    </div>
    <div class="grid2">
      <div><label>Estoque${p.by_weight ? ' (kg)' : ''}</label>
        <input class="f" id="eEstoque" inputmode="decimal" value="${String(p.stock).replace('.', ',')}"></div>
      <div><label>Estoque mínimo</label>
        <input class="f" id="eMin" inputmode="decimal" value="${String(p.min_stock).replace('.', ',')}"></div>
    </div>
    <div class="grid2">
      <div><label>Categoria</label><input class="f" id="eCat" value="${esc(p.category)}"></div>
      <div><label>Código de barras</label>
        <div style="display:flex;gap:6px">
          <input class="f" id="eBar" inputmode="numeric" value="${esc(p.barcode || '')}">
          <button type="button" class="btn" style="margin:0;width:52px;flex-shrink:0;font-size:22px;padding:0" onclick="openScanner()" title="Ler com a câmera">📷</button>
        </div>
      </div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:14px">
      <input type="checkbox" id="eAtivo" ${p.active ? 'checked' : ''}> Produto ativo (aparece no caixa)
    </label>
    <button class="btn" onclick="saveEdit(this)">${p.id ? 'Salvar alterações' : 'Criar produto'}</button>
    <button class="btn ghost" onclick="this.closest('.sheet-bg').remove()">Cancelar</button>
  </div>`
  document.body.appendChild(bg)
}
window.maskMoney = maskMoney

// Leitor de código de barras pela câmera (ZXing). Preenche o campo #eBar.
let scanReader = null
window.openScanner = async () => {
  if (typeof ZXing === 'undefined') { toast('Leitor não carregou — verifique a internet'); return }
  const ov = document.createElement('div')
  ov.id = 'scanOverlay'
  ov.style.cssText = 'position:fixed;inset:0;z-index:100;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden'
  ov.innerHTML = `
    <video id="scanVideo" playsinline muted style="width:100%;height:100%;object-fit:cover"></video>
    <div style="position:absolute;width:78%;height:28%;border:3px solid var(--gold-l);border-radius:14px;box-shadow:0 0 0 100vmax #0009"></div>
    <div style="position:absolute;top:calc(18px + env(safe-area-inset-top));left:0;right:0;text-align:center;color:#fff;font-weight:700">Aponte pro código de barras</div>
    <button onclick="closeScanner()" style="position:absolute;bottom:calc(28px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#fff;color:#111;border:none;border-radius:99px;padding:14px 34px;font-size:16px;font-weight:800">Fechar</button>`
  document.body.appendChild(ov)
  const video = ov.querySelector('#scanVideo')
  try {
    scanReader = new ZXing.BrowserMultiFormatReader()
    await scanReader.decodeFromConstraints({ video: { facingMode: 'environment' } }, video, (result) => {
      if (!result) return
      const code = (result.text || (result.getText && result.getText()) || '').replace(/\D/g, '')
      if (code.length >= 6) {
        const inp = document.getElementById('eBar')
        if (inp) inp.value = code
        if (navigator.vibrate) navigator.vibrate(120)
        closeScanner()
        toast('Código lido: ' + code)
      }
    })
  } catch (e) {
    closeScanner()
    toast('Não consegui abrir a câmera. Permita o acesso nas configurações.')
  }
}
window.closeScanner = () => {
  try { if (scanReader) scanReader.reset() } catch {}
  scanReader = null
  document.getElementById('scanOverlay')?.remove()
}

// Redimensiona a foto no próprio celular (máx 512px) e guarda como data URL
window.onPhotoPick = (input) => {
  const file = input.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = () => {
    const img = new Image()
    img.onload = () => {
      const max = 512
      let w = img.width, h = img.height
      if (w > max) { h = Math.round(h * max / w); w = max }
      const canvas = document.createElement('canvas')
      canvas.width = w; canvas.height = h
      canvas.getContext('2d').drawImage(img, 0, 0, w, h)
      editP.photo = canvas.toDataURL('image/jpeg', 0.75)
      const prev = document.getElementById('ePhotoPreview')
      prev.src = editP.photo
      prev.style.display = 'block'
      document.getElementById('ePhotoEmpty').style.display = 'none'
    }
    img.src = reader.result
  }
  reader.readAsDataURL(file)
}

window.saveEdit = async (btn) => {
  const g = (id) => document.getElementById(id)
  const num = (v) => parseFloat(String(v).replace(',', '.')) || 0
  const payload = {
    name: g('eNome').value.trim(),
    price: cents(g('ePreco').value),
    cost: cents(g('eCusto').value),
    stock: num(g('eEstoque').value),
    min_stock: num(g('eMin').value),
    category: g('eCat').value.trim(),
    barcode: g('eBar').value.trim(),
    active: g('eAtivo').checked ? 1 : 0,
    by_weight: editP.by_weight ? 1 : 0
  }
  // Só envia a foto se o dono escolheu uma nova (senão preserva a atual no caixa)
  if (editP.photo) payload.photo = editP.photo
  if (!payload.name) { toast('Nome é obrigatório'); return }
  btn.disabled = true
  btn.textContent = 'Enviando…'
  try {
    if (editP.id) { await sendCommand('product.update', { id: editP.id, ...payload }); markEdited(editP.id) }
    else await sendCommand('product.create', payload)
    // otimista: já reflete no app enquanto o caixa aplica
    if (editP.id) Object.assign(snap.products.find((x) => x.id === editP.id), payload)
    else snap.products.unshift({ id: 'novo', ...payload })
    document.querySelector('.sheet-bg').remove()
    toast('✓ Enviado — o caixa aplica em até 15s')
    renderProdutos()
  } catch (e) {
    btn.disabled = false
    btn.textContent = 'Tentar de novo'
    toast('Falhou: ' + e.message)
  }
}

// ---------- COMANDAS (dono cadastra os pedidos das mesas) ----------
// O celular mantém uma cópia LOCAL de cada comanda (localComandas), que sobrevive
// à atualização da nuvem e a trocar de mesa — os itens só vão SOMANDO, nunca substituem.

function comandaItemsFor(mesa) {
  const key = String(mesa)
  if (localComandas[key]) return localComandas[key]
  const c = (snap.comandas || []).find((x) => String(x.mesa) === key)
  return c ? c.items.map((i) => ({ product_id: i.product_id, name: i.name, qty: i.qty, unit_price: i.unit_price })) : []
}

// Une comandas da nuvem com rascunhos locais (mesa ainda não sincronizada também aparece)
function comandasList() {
  const byMesa = {}
  for (const c of (snap.comandas || [])) byMesa[String(c.mesa)] = { mesa: c.mesa, customer_name: c.customer_name, items: c.items }
  for (const mesa of Object.keys(localComandas)) byMesa[mesa] = { mesa, customer_name: (byMesa[mesa] || {}).customer_name || '', items: localComandas[mesa] }
  return Object.values(byMesa)
    .filter((c) => !closingMesas.has(String(c.mesa)))
    .map((c) => ({ ...c, total: c.items.reduce((a, i) => a + i.qty * i.unit_price, 0) }))
    .sort((a, b) => String(a.mesa).localeCompare(String(b.mesa), undefined, { numeric: true }))
}

function renderComandas() {
  if (selectedMesa !== null) return renderComandaDetail()
  const list = comandasList()
  app.innerHTML = `
    <div class="top"><img src="logo.png"><div><h1>Comandas</h1>
      <div class="upd">${list.length} aberta(s) · toque pra adicionar pedidos</div></div></div>
    <button class="btn" style="margin:0 0 12px" onclick="novaMesa()">+ Nova mesa</button>
    ${list.map((c) => `
      <div class="prow" onclick="abrirMesa('${esc(String(c.mesa || ''))}')">
        <div class="nm">${c.mesa ? 'Mesa ' + esc(c.mesa) : esc(c.customer_name || 'Comanda')}
          <div class="sub">${c.items.length} ${c.items.length === 1 ? 'item' : 'itens'}${c.items.length ? ' · ' + esc(c.items.map((i) => i.qty + 'x ' + i.name).join(', ')).slice(0, 46) : ''}</div>
        </div>
        <span class="gold">${money(c.total)}</span>
      </div>`).join('') || '<p class="center muted">Nenhuma comanda aberta.<br>Toque em "+ Nova mesa" pra começar.</p>'}
  `
}

window.novaMesa = () => {
  const mesa = prompt('Número da mesa:')
  if (mesa && mesa.trim()) abrirMesa(mesa.trim())
}
window.abrirMesa = (mesa) => { selectedMesa = String(mesa); cTerm = ''; renderComandas() }
window.voltarComandas = () => { selectedMesa = null; cTerm = ''; renderComandas() }
window.setCTerm = (t) => { cTerm = t; renderComandaDetail(); refocus('.search input') }

function renderComandaDetail() {
  const items = comandaItemsFor(selectedMesa)
  const total = items.reduce((a, i) => a + i.qty * i.unit_price, 0)
  const prods = (snap.products || [])
    .filter((p) => p.active && !p.by_weight && p.stock > 0)
    .filter((p) => !cTerm || p.name.toLowerCase().includes(cTerm.toLowerCase()) || p.barcode === cTerm)
    .slice(0, 40)
  app.innerHTML = `
    <div class="top">
      <button class="btn ghost" style="width:auto;margin:0;padding:8px 14px;font-size:18px" onclick="voltarComandas()">←</button>
      <div><h1>Mesa ${esc(selectedMesa)}</h1><div class="upd">${money(total)} · ${items.length} ${items.length === 1 ? 'item' : 'itens'}</div></div>
    </div>
    ${items.length ? '<section>' + items.map((i, idx) => `<div class="line"><span>${i.qty}x ${esc(i.name)}</span><span style="display:flex;align-items:center;gap:12px"><span class="gold">${money(i.qty * i.unit_price)}</span><button onclick="decComandaItem(${idx})" style="background:none;border:none;color:var(--danger);font-size:20px;line-height:1;padding:0 4px">−</button></span></div>`).join('') + '</section>' : '<p class="muted" style="text-align:center;margin:10px 0">Sem itens ainda — busque e toque num produto.</p>'}
    <div class="search"><input placeholder="🔍 Adicionar produto…" value="${esc(cTerm)}" oninput="setCTerm(this.value)"></div>
    ${prods.map((p) => `
      <div class="prow" onclick="addComandaItem(${p.id})">
        <div class="nm">${esc(p.name)}<div class="sub">${money(p.price)} · ${p.stock} em estoque</div></div>
        <button class="add" style="width:38px;height:38px;border-radius:10px;background:linear-gradient(180deg,var(--gold-l),var(--gold));color:#21301c;border:none;font-size:20px;font-weight:800">+</button>
      </div>`).join('')}
    ${items.length ? `<button class="cartbar" onclick="finalizarComanda()">Finalizar comanda · ${money(total)}</button>` : ''}
  `
}

// Fecha a comanda pelo celular: escolhe forma de pagamento e registra a venda no caixa.
// (Impressão do cupom e NFC-e continuam no caixa.)
window.finalizarComanda = () => {
  const items = comandaItemsFor(selectedMesa)
  const total = items.reduce((a, i) => a + i.qty * i.unit_price, 0)
  if (!items.length) { toast('Comanda vazia'); return }
  const mesa = selectedMesa
  const bg = document.createElement('div')
  bg.className = 'sheet-bg'
  bg.onclick = (e) => { if (e.target === bg) bg.remove() }
  bg.innerHTML = `<div class="sheet">
    <h2>Finalizar — Mesa ${esc(mesa)}</h2>
    <div class="line" style="font-size:17px"><span>Total</span><b class="gold" style="font-size:22px">${money(total)}</b></div>
    <label>Forma de pagamento</label>
    <div class="paybtns" id="fpag">
      ${['Dinheiro', 'PIX', 'Débito', 'Crédito'].map((m, i) => `<button class="${i === 0 ? 'on' : ''}" onclick="pickPag(this,'${m}')">${m}</button>`).join('')}
    </div>
    <p class="muted" style="font-size:13px;margin-top:12px">O cupom e a NFC-e são impressos no caixa.</p>
    <button class="btn" onclick="confirmarFinalizar('${esc(mesa)}', this)">Fechar e registrar no caixa</button>
    <button class="btn ghost" onclick="this.closest('.sheet-bg').remove()">Cancelar</button>
  </div>`
  document.body.appendChild(bg)
  bg.dataset.pag = 'Dinheiro'
}
window.pickPag = (btn, m) => {
  const box = btn.closest('#fpag'); box.querySelectorAll('button').forEach((b) => b.classList.remove('on'))
  btn.classList.add('on'); btn.closest('.sheet-bg').dataset.pag = m
}
window.confirmarFinalizar = async (mesa, btn) => {
  const pag = btn.closest('.sheet-bg').dataset.pag || 'Dinheiro'
  btn.disabled = true; btn.textContent = 'Enviando…'
  try {
    await sendCommand('comanda.close', { mesa, payment_method: pag })
    closingMesas.add(String(mesa))
    delete localComandas[String(mesa)]
    saveLocalComandas()
    document.querySelector('.sheet-bg').remove()
    selectedMesa = null
    toast('✓ Comanda fechada — registrada no caixa (' + pag + ')')
    renderComandas()
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Tentar de novo'
    toast('Falhou: ' + e.message)
  }
}

// Garante um rascunho local pra mesa (seedando com o que veio da nuvem)
function ensureDraft(mesa) {
  const key = String(mesa)
  if (!localComandas[key]) {
    const c = (snap.comandas || []).find((x) => String(x.mesa) === key)
    localComandas[key] = c ? c.items.map((i) => ({ product_id: i.product_id, name: i.name, qty: i.qty, unit_price: i.unit_price })) : []
  }
  return localComandas[key]
}

window.addComandaItem = async (productId) => {
  const prod = (snap.products || []).find((p) => p.id === productId)
  if (!prod) return
  const items = ensureDraft(selectedMesa)
  const ex = items.find((i) => i.product_id === productId)
  if (ex) ex.qty += 1
  else items.push({ product_id: productId, name: prod.name, qty: 1, unit_price: prod.price })
  saveLocalComandas()
  renderComandaDetail()
  if (navigator.vibrate) navigator.vibrate(30)
  try { await sendCommand('comanda.addItem', { mesa: selectedMesa, product_id: productId, qty: 1 }) }
  catch (e) { toast('Falhou ao enviar: ' + e.message) }
}

// Diminui 1 (corrige engano) — some do caixa também
window.decComandaItem = async (idx) => {
  const items = ensureDraft(selectedMesa)
  const it = items[idx]
  if (!it) return
  const pid = it.product_id
  it.qty -= 1
  if (it.qty <= 0) items.splice(idx, 1)
  saveLocalComandas()
  renderComandaDetail()
  if (navigator.vibrate) navigator.vibrate(20)
  try { await sendCommand('comanda.addItem', { mesa: selectedMesa, product_id: pid, qty: -1 }) }
  catch (e) { toast('Falhou: ' + e.message) }
}

// ---------- VENDA ----------
function renderVenda() {
  const list = (snap.products || [])
    .filter((p) => p.active && !p.by_weight && p.stock > 0)
    .filter((p) => !vTerm || p.name.toLowerCase().includes(vTerm.toLowerCase()) || p.barcode === vTerm)
    .slice(0, 60)
  const total = Object.entries(cart).reduce((a, [id, q]) => {
    const p = snap.products.find((x) => x.id == id)
    return a + (p ? p.price * q : 0)
  }, 0)
  const count = Object.values(cart).reduce((a, q) => a + q, 0)
  app.innerHTML = `
    <div class="top"><img src="logo.png"><div><h1>Venda rápida</h1>
      <div class="upd">registra direto no caixa (produtos por unidade)</div></div></div>
    <div class="search"><input placeholder="🔍 Buscar produto…" value="${esc(vTerm)}" oninput="setVTerm(this.value)"></div>
    <section style="padding:10px 14px"><label style="margin:0 0 6px">Forma de pagamento</label>
      <div class="paybtns">
        ${['Dinheiro', 'PIX', 'Débito', 'Crédito'].map((m) =>
          `<button class="${payMethod === m ? 'on' : ''}" onclick="setPay('${m}')">${m}</button>`).join('')}
      </div>
    </section>
    ${list.map((p) => `
      <div class="prow">
        <div class="nm">${esc(p.name)}<div class="sub">${money(p.price)} · ${p.stock} em estoque</div></div>
        <div class="stepper">
          ${cart[p.id] ? `<button onclick="vDec(${p.id})">−</button><span>${cart[p.id]}</span>` : ''}
          <button class="add" onclick="vInc(${p.id})">+</button>
        </div>
      </div>`).join('')}
    ${count > 0 ? `<button class="cartbar" onclick="sendSale(this)">Registrar venda (${count}) · ${money(total)} — ${esc(payMethod)}</button>` : ''}
  `
}
window.setPay = (m) => { payMethod = m; renderVenda() }
window.vInc = (id) => { cart[id] = (cart[id] || 0) + 1; renderVenda() }
window.vDec = (id) => { cart[id] = (cart[id] || 0) - 1; if (cart[id] <= 0) delete cart[id]; renderVenda() }

window.sendSale = async (btn) => {
  btn.disabled = true
  btn.textContent = 'Enviando…'
  try {
    const items = Object.entries(cart).map(([id, qty]) => ({ id: Number(id), qty }))
    await sendCommand('sale.create', { items, payment_method: payMethod })
    cart = {}
    toast('✓ Venda enviada — o caixa registra em até 15s')
    renderVenda()
  } catch (e) {
    btn.disabled = false
    toast('Falhou: ' + e.message)
    renderVenda()
  }
}

load()
setInterval(load, 20000)
document.addEventListener('visibilitychange', () => { if (!document.hidden) load() })
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js')
</script>
